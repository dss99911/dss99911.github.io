<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eye Exercise App</title>
<link rel="stylesheet" href="css/styles.css?v=5">
</head>
<body>

<!-- Main Menu -->
<div id="menuView">
  <div class="header">
    <h1>Eye Exercise</h1>
    <p>눈 건강을 위한 시각 추적 운동</p>
    <div class="difficulty-selector" id="menuDifficulty">
      <button class="diff-btn" data-diff="1" onclick="setDifficulty(1)">초급</button>
      <button class="diff-btn active" data-diff="2" onclick="setDifficulty(2)">중급</button>
      <button class="diff-btn" data-diff="3" onclick="setDifficulty(3)">고급</button>
    </div>
  </div>
  <div class="menu" id="categoryMenu"></div>
</div>

<!-- Exercise View -->
<div id="exerciseView" class="exercise-view">
  <div class="exercise-header">
    <button class="btn btn-back" onclick="goBack()">← 메뉴</button>
    <span class="exercise-title" id="exTitle"></span>
    <div class="controls-bar">
      <span class="exercise-info" id="exInfo"></span>
      <button class="btn-icon" id="settingsBtn" onclick="toggleSettings()">⚙️</button>
      <button class="btn-icon" id="pauseBtn" onclick="togglePause()">⏸️</button>
    </div>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <label>속도</label>
    <input type="range" id="speedSlider" min="0.3" max="3" step="0.1" value="1" oninput="updateSpeed(this.value)">
    <div class="speed-value" id="speedValue">1.0x</div>
    <label>운동 시간 (초)</label>
    <select id="durationSelect" onchange="updateDuration(this.value)">
      <option value="30">30초</option>
      <option value="60" selected>60초</option>
      <option value="120">2분</option>
      <option value="180">3분</option>
      <option value="300">5분</option>
    </select>
    <label>점 크기</label>
    <input type="range" id="dotSizeSlider" min="8" max="40" step="2" value="18" oninput="updateDotSize(this.value)">
  </div>

  <div class="canvas-container">
    <canvas id="exerciseCanvas"></canvas>
  </div>

  <div class="speed-indicator" id="speedIndicator">
    <span id="phaseLabel" class="phase-label">워밍업</span>
    <div class="speed-bar"><div class="speed-bar-fill" id="speedBarFill" style="width:50%"></div></div>
    <span id="currentSpeedLabel">1.0x</span>
  </div>
  <div class="timer-display" id="timerDisplay"></div>
  <div class="progress-bar" id="progressBar"></div>
</div>

<!-- Scripts -->
<script src="js/core.js?v=3"></script>
<script src="js/exercises/smooth-pursuit.js?v=2"></script>
<script src="js/exercises/figure8.js?v=2"></script>
<script src="js/exercises/saccade.js?v=2"></script>
<script src="js/exercises/h-pattern.js?v=2"></script>
<script src="js/exercises/speed-reading.js?v=2"></script>
<script src="js/exercises/dynamic-acuity.js?v=2"></script>
<script src="js/exercises/visual-span.js?v=2"></script>
<script src="js/exercises/peripheral-detection.js?v=2"></script>
<script src="js/exercises/zigzag.js?v=2"></script>
<script src="js/exercises/schulte-table.js?v=2"></script>
<script src="js/exercises/rsvp.js?v=2"></script>
<script src="js/exercises/tachistoscope.js?v=2"></script>
<script src="js/exercises/eye-hop.js?v=2"></script>
<script src="js/exercises/bouncing-ball.js?v=3"></script>
<script src="js/exercises/mot.js?v=3"></script>
<script src="js/exercises/spiral-pursuit.js?v=3"></script>
<script src="js/exercises/reaction-flash.js?v=4"></script>
<script src="js/exercises/color-trail.js?v=3"></script>
<script src="js/exercises/guided.js?v=2"></script>
<script src="js/exercises/clock-tracking.js?v=1"></script>
<script src="js/exercises/diamond-pattern.js?v=1"></script>
<script src="js/exercises/vergence-rock.js?v=1"></script>
<script src="js/exercises/circular-pursuit.js?v=1"></script>
<script src="js/exercises/metronome-reading.js?v=1"></script>
<script src="js/exercises/number-flash.js?v=1"></script>
<script src="js/exercises/column-reading.js?v=1"></script>
<script src="js/exercises/useful-fov.js?v=1"></script>
<script src="js/exercises/flanker-task.js?v=1"></script>
<script src="js/exercises/crowding-resistance.js?v=1"></script>
<script src="js/exercises/attention-window.js?v=1"></script>
<script src="js/exercises/memory-flash.js?v=1"></script>
<script src="js/exercises/anti-saccade.js?v=1"></script>
<script src="js/exercises/visual-search.js?v=2"></script>
<script src="js/exercises/pencil-pushup.js?v=1"></script>
<script src="js/exercises/eye-yoga.js?v=1"></script>
<script src="js/exercises/dark-adaptation.js?v=1"></script>
<script src="js/exercise-info.js?v=4"></script>
<script src="js/app.js?v=5"></script>
</body>
</html>
