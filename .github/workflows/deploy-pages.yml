name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install dependencies
        run: |
          bundle lock --add-platform x86_64-linux
          bundle install --jobs 4

      - uses: actions/configure-pages@v5

      - name: Build Jekyll
        run: |
          set +e
          bundle exec jekyll build --trace 2>&1 | tee /tmp/jekyll-build.log
          rc=${PIPESTATUS[0]}
          if [ $rc -ne 0 ]; then
            # Surface last 80 lines of build output via annotation (visible without admin)
            tail -n 80 /tmp/jekyll-build.log > /tmp/jekyll-tail.log
            msg=$(awk 'BEGIN{ORS="%0A"} {gsub(/\r/,""); print}' /tmp/jekyll-tail.log)
            echo "::error title=Jekyll build failed::${msg}"
            exit $rc
          fi
        env:
          JEKYLL_ENV: production

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
